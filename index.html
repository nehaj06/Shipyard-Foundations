<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>CI/CD Assignment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 3rem 4rem;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    p  { color: #cbd5e0; margin-bottom: 1.5rem; }
    .badge {
      background: #38a169;
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 CI/CD Pipeline</h1>
    <p>Automatically deployed with GitHub Actions</p>
    <div class="badge">✅ Live on GitHub Pages</div>
    <p style="margin-top:1rem; font-size:0.9rem;">Neha J | nehaj@mulearn</p>
  </div>
</body>
</html>
